# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

plugins:
  import_lint: ^2.0.0

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    # avoid_print: false  # Uncomment to disable the `avoid_print` rule
    # prefer_single_quotes: true  # Uncomment to enable the `prefer_single_quotes` rule

# Enforces the inward-only dependency rule from ARCHITECTURE.md (§1, §11):
# presentation -> domain <- data; core/shared are leaves; domain is pure Dart.
# Checked in CI via `dart run import_lint` (exits non-zero on any violation).
import_lint:
  # Any violation is a hard error so `dart run import_lint` exits non-zero and
  # fails CI (the default is a soft warning that exits 0).
  severity: error
  rules:
    # Domain is pure Dart — no Flutter.
    domain_no_flutter:
      target: "package:currency_exchange_tracker/features/*/domain/**/*.dart"
      from: "package:flutter/*.dart"
      except: []
    # Domain must not depend on the data layer (dependencies point inward).
    domain_no_data:
      target: "package:currency_exchange_tracker/features/*/domain/**/*.dart"
      from: "package:currency_exchange_tracker/features/*/data/**/*.dart"
      except: []
    # Domain must not depend on the presentation layer.
    domain_no_presentation:
      target: "package:currency_exchange_tracker/features/*/domain/**/*.dart"
      from: "package:currency_exchange_tracker/features/*/presentation/**/*.dart"
      except: []
    # Presentation talks to domain, never straight to data.
    presentation_no_data:
      target: "package:currency_exchange_tracker/features/*/presentation/**/*.dart"
      from: "package:currency_exchange_tracker/features/*/data/**/*.dart"
      except: []
    # Data may depend on domain/core, never on presentation (no widgets/Bloc).
    data_no_presentation:
      target: "package:currency_exchange_tracker/features/*/data/**/*.dart"
      from: "package:currency_exchange_tracker/features/*/presentation/**/*.dart"
      except: []
    # core infrastructure is a leaf; it must not reference features. The DI
    # composition root (core/di/injection.dart) is the deliberate exception —
    # it wires features together — so it is not among the targeted directories.
    core_no_features:
      target: "package:currency_exchange_tracker/core/{network,error,result,config,localization,network_info}/**/*.dart"
      from: "package:currency_exchange_tracker/features/**/*.dart"
      except: []
    # shared (reusable UI + helpers) must never depend on a feature.
    shared_no_features:
      target: "package:currency_exchange_tracker/shared/**/*.dart"
      from: "package:currency_exchange_tracker/features/**/*.dart"
      except: []

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
